<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀 - 9人局</title>
<style>
  :root {
    --bg-night: #070b19; --bg-day: #0f1528;
    --card-bg: rgba(20,24,52,0.85); --card-border: rgba(255,255,255,0.08);
    --accent: #e94560; --gold: #f0c040; --gold-dim: #8a7030;
    --text: #f0f0f6; --muted: #8888aa;
    --good: #4ecca3; --wolf: #e94560;
    --log-system: #aabbdd; --log-god: #f0c040; --log-death: #e94560; --log-speech: #f0ead0;
    --glow-gold: 0 0 20px rgba(240,192,64,0.3);
    --glow-red: 0 0 20px rgba(233,69,96,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
    background:#1a2235;color:var(--text);
    min-height:100vh;overflow-x:hidden;
    transition:background 1.5s ease;
  }
  body.day-mode{background:#1b2843}

  /* 星空 */
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.5;transition:opacity 1.5s}
  body.day-mode .stars{opacity:.1}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;animation-delay:var(--delay)}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(2)}}

  .container{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;padding:4px 10px 6px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* 顶部栏 */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--card-bg);border-radius:8px;border:1px solid var(--card-border);backdrop-filter:blur(8px);margin-bottom:4px;flex-shrink:0}
  .phase-indicator{display:flex;align-items:center;gap:5px}
  .phase-icon{font-size:1rem}.phase-text{font-weight:700;font-size:.78rem}
  .phase-text.night{color:#8899dd}.phase-text.day{color:#f0c040}
  .round-badge{font-size:.68rem;padding:2px 8px}

  /* 玩家卡片 */
  .players-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:4px;flex-shrink:0}
  .player-card{position:relative;background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:3px 2px;text-align:center;cursor:default;transition:all .3s;user-select:none}
  .player-card.selectable{cursor:pointer;border-color:rgba(255,255,255,.18)}
  .player-card.selectable:hover{border-color:var(--accent);background:rgba(233,69,96,.12);transform:translateY(-2px)}
  .player-card.selectable:active{transform:scale(.95)}
  .player-card.speaking{border-color:var(--gold)!important;animation:spkPulse 1s ease-in-out infinite}
  @keyframes spkPulse{0%,100%{box-shadow:0 0 4px rgba(240,192,64,.2)}50%{box-shadow:0 0 12px rgba(240,192,64,.5)}}
  .player-card.dead{opacity:.4;filter:grayscale(.7);border-color:transparent}
  .player-card.human{border-color:rgba(240,192,64,.4)}
  .card-num{display:inline-block;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.14);font-weight:800;font-size:.65rem;line-height:18px;margin-bottom:1px}
  .player-card.human .card-num{background:var(--gold);color:#1a1a2e}
  .player-card.dead .card-num{background:#333;color:#666}
  .card-avatar{font-size:1.2rem;line-height:1.2;transition:all .3s}
  .card-label{font-size:.6rem;color:var(--muted)}
  .card-badge{position:absolute;top:-3px;right:-3px;font-size:.55rem;background:var(--accent);color:#fff;padding:1px 5px;border-radius:8px;font-weight:700}
  .card-badge.you{background:var(--gold);color:#1a1a2e}

  /* 日志区 */
  .log-area{flex:1;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px;margin-bottom:6px;overflow-y:auto;border:1px solid var(--card-border);font-size:.8rem;line-height:1.6;scroll-behavior:smooth;min-height:0}
  .log-area::-webkit-scrollbar{width:3px}.log-area::-webkit-scrollbar-track{background:transparent}.log-area::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .log-line{margin-bottom:3px;animation:logIn .4s ease;padding:2px 0}
  @keyframes logIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .log-line.god{color:var(--log-god);font-weight:600}
  .log-line.system{color:var(--log-system)}
  .log-line.death{color:var(--log-death);font-weight:700;font-size:.9rem}
  .log-line.speech{color:var(--log-speech)}
  .log-line.speech .spkr{color:#88bbff;font-weight:700}

  /* 操作区 */
  .action-area{flex-shrink:0;background:var(--card-bg);border-radius:8px;padding:8px 12px;border:1px solid var(--card-border)}
  .action-prompt{font-size:.82rem;font-weight:600;margin-bottom:6px;text-align:center}
  .action-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .btn{padding:8px 14px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:#fff;position:relative;overflow:hidden}
  .btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
  .btn:active::after{width:300px;height:300px}
  .btn:active{transform:scale(.95)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .btn-action{background:linear-gradient(135deg,#2a4a8a,#3a5aaa);box-shadow:0 2px 8px rgba(42,74,138,.3)}
  .btn-action:hover:not(:disabled){background:linear-gradient(135deg,#3a5aaa,#4a6aba);box-shadow:0 4px 16px rgba(42,74,138,.5);transform:translateY(-2px)}
  .btn-danger{background:linear-gradient(135deg,#8a2a3a,#aa3a4a)}
  .btn-danger:hover:not(:disabled){background:linear-gradient(135deg,#aa3a4a,#ba4a5a);transform:translateY(-2px)}
  .btn-accent{background:linear-gradient(135deg,#c0392b,#e94560);box-shadow:0 2px 12px rgba(233,69,96,.3)}
  .btn-accent:hover:not(:disabled){background:linear-gradient(135deg,#e94560,#ff5a7a);transform:translateY(-2px);box-shadow:0 4px 20px rgba(233,69,96,.5)}
  .btn-skip{background:rgba(255,255,255,.08);color:#aaa}
  .btn-skip:hover:not(:disabled){background:rgba(255,255,255,.14)}
  .btn-start{background:linear-gradient(135deg,#c0392b,#e94560,#ff6b3d);font-size:1rem;padding:12px 24px;width:100%;box-shadow:0 4px 20px rgba(233,69,96,.4)}
  .btn-start:hover:not(:disabled){box-shadow:0 6px 30px rgba(233,69,96,.6);transform:translateY(-2px)}
  .btn-mic-btn{background:rgba(255,255,255,.08);font-size:1rem;min-width:36px;border-radius:50%;padding:8px;aspect-ratio:1}
  .btn-mic-btn.listening{background:var(--accent);animation:micPulse 1.5s infinite}
  @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(233,69,96,.5)}50%{box-shadow:0 0 0 12px rgba(233,69,96,0)}}

  .speech-row{display:flex;gap:6px;align-items:center;margin-top:6px}
  .speech-row input{flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--card-border);background:rgba(0,0,0,.3);color:var(--text);font-family:inherit;font-size:.82rem;outline:none}
  .mic-status{font-size:.7rem;color:var(--muted);min-height:16px;margin-top:3px}

  .api-row{display:flex;align-items:center;gap:6px;padding:4px 10px;margin-bottom:4px;background:var(--card-bg);border-radius:6px;border:1px solid var(--card-border);font-size:.72rem;flex-shrink:0}
  .api-row label{color:var(--muted);white-space:nowrap;font-size:.7rem}
  .api-row input{flex:1;padding:3px 8px;border-radius:4px;border:1px solid var(--card-border);background:rgba(0,0,0,.3);color:var(--text);font-family:inherit;font-size:.7rem;outline:none}
  .api-row input:focus{border-color:var(--accent)}
  .api-dot{font-size:.7rem;white-space:nowrap}.api-dot.ok{color:var(--good)}.api-dot.no{color:var(--muted)}

  .btn-mute{background:none;border:1px solid var(--card-border);color:var(--text);font-size:.9rem;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
  .btn-mute:hover{background:rgba(255,255,255,.08)}
  .btn-mute.muted{color:var(--muted);border-color:#444}
  .night-veil{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;transition:all 1.5s ease;background:transparent}
  .night-veil.active{background:radial-gradient(ellipse at 50% 90%,rgba(25,35,70,.18) 0%,rgba(10,15,30,.08) 100%)}
  .day-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;transition:opacity 1.5s;opacity:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,190,80,.15) 0%,rgba(200,140,40,.06) 40%,transparent 65%)}
  body.day-mode .day-glow{opacity:1}

  .lock-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#050816;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
  .lock-box{background:var(--card-bg);border-radius:16px;padding:32px 28px;border:1px solid var(--card-border);text-align:center;max-width:340px;width:90%}
  .lock-box h2{margin-bottom:8px;font-size:1.5rem}.lock-box p{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .lock-box input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--card-border);background:rgba(0,0,0,.4);color:var(--text);font-family:inherit;font-size:1rem;text-align:center;outline:none;margin-bottom:12px}
  .lock-box input:focus{border-color:var(--accent)}.lock-box .lock-msg{color:var(--accent);font-size:.8rem;min-height:20px}

  .gameover-banner{text-align:center;padding:20px 0}
  .gameover-banner .result-icon{font-size:3rem;margin-bottom:10px}
  .gameover-banner .result-text{font-size:1.3rem;font-weight:700;margin-bottom:16px}

  .debug-info{font-size:.65rem;color:var(--muted);text-align:center;opacity:.4;flex-shrink:0;padding:6px 0;word-break:break-all}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- 星空背景 -->
<div class="stars" id="stars"></div>

<div class="day-glow" id="dayGlow"></div>
<!-- 黑夜遮罩 -->
<div class="night-veil" id="nightVeil"></div>

<!-- 密码锁屏 -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <h2>🐺 狼人杀</h2>
    <p id="lockPrompt">请输入访问密码</p>
    <input type="password" id="lockInput" placeholder="输入密码..." onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="btn btn-accent" onclick="checkPassword()" style="width:100%;">进入游戏</button>
    <div class="lock-msg" id="lockMsg"></div>
  </div>
</div>

<div class="container">

  <!-- 顶部状态栏 -->
  <div class="top-bar" id="topBar">
    <div class="phase-indicator">
      <span class="phase-icon" id="phaseIcon">⏳</span>
      <span class="phase-text" id="phaseLabel">准备开始</span>
    </div>
    <span class="round-badge" id="roundLabel"></span>
    <button class="btn-end" id="btnEnd" onclick="endGame()" title="结束当前游戏" style="display:none;">⏹ 结束</button>
    <button class="btn-mute" id="btnMute" onclick="toggleMute()" title="静音AI语音">🔊</button>
  </div>

  <!-- API Key -->
  <div class="api-row" id="apiRow">
    <label>🔑 Key:</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." onchange="saveApiKey()">
    <span class="api-dot no" id="apiStatus">未设置</span>
  </div>

  <!-- 玩家卡片 -->
  <div class="players-grid" id="playersGrid"></div>

  <!-- 日志区 -->
  <div class="log-area" id="logArea">
    <div class="log-line system">等待游戏开始...</div>
  </div>

  <!-- 操作区 -->
  <div class="action-area" id="actionArea">
    <div class="action-prompt" id="actionPrompt">🎮 准备好了吗？</div>
    <div class="action-btns" id="actionButtons">
      <button class="btn btn-start" onclick="startGame()">🎮 开始游戏</button>
    </div>
    <div class="speech-row hidden" id="speechRow">
      <input type="text" id="textInput" placeholder="输入你的发言..." onkeydown="if(event.key==='Enter')submitText()">
      <button class="btn btn-mic-btn" id="btnMic" onclick="toggleMic()">🎤</button>
      <button class="btn btn-action" onclick="submitText()" style="display:none;" id="btnSend">发送</button>
    </div>
    <div class="mic-status" id="micStatusLine"></div>
  </div>

  <div class="debug-info" id="debugInfo"></div>
</div>

<script>
// ╔══════════════════════════════════╗
// ║    狼人杀 9人局 游戏引擎       ║
// ╚══════════════════════════════════╝

// ============ 常量定义 ============
const R = {
  SEER:   { id:'SEER',   name:'预言家', camp:'good', emoji:'🔮', nightOrder:2, icon:'🔮', desc:'每晚查验一名玩家' },
  WITCH:  { id:'WITCH',  name:'女巫',   camp:'good', emoji:'🧪', nightOrder:3, icon:'🧪', desc:'解药和毒药各一瓶' },
  HUNTER: { id:'HUNTER', name:'猎人',   camp:'good', emoji:'🏹', nightOrder:0, icon:'🏹', desc:'出局时可开枪带人' },
  WOLF:   { id:'WOLF',   name:'狼人',   camp:'wolf', emoji:'🐺', nightOrder:1, icon:'🐺', desc:'每晚猎杀一名玩家' },
  VILL:   { id:'VILL',   name:'平民',   camp:'good', emoji:'👤', nightOrder:0, icon:'👤', desc:'无特殊能力' },
};

const POOL = ['SEER','WITCH','HUNTER','WOLF','WOLF','WOLF','VILL','VILL','VILL'];
const N = 9;
const DEEPSEEK_API = 'https://api.deepseek.com/v1/chat/completions';

// ============ 星空背景 ============
(function createStars(){
  const c = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
      --dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;
    `;
    c.appendChild(s);
  }
})();

// ============ API Key 管理 ============
function saveApiKey(){
  const key = $('apiKeyInput').value.trim();
  if(key) localStorage.setItem('deepseek_key', key);
  updateApiStatus();
}
function loadApiKey(){
  const saved = localStorage.getItem('deepseek_key') || '';
  $('apiKeyInput').value = saved;
  updateApiStatus();
}
function getApiKey(){ return $('apiKeyInput').value.trim() || localStorage.getItem('deepseek_key') || ''; }
function updateApiStatus(){
  const has = !!getApiKey();
  const el = $('apiStatus');
  el.textContent = has ? '已设置' : '未设置';
  el.className = 'api-dot ' + (has ? 'ok' : 'no');
}

// ============ 全局状态 ============
let G = {
  started: false, round: 0, phase: 'init', aborted: false,
  players: [], humanIdx: -1,
  nightTargets: { wolf:null, seer:null, guard:null },
  witchAntidote: true, witchPoison: true,
  witchSaved: null, witchPoisoned: null, lastGuardTarget: null,
  nightKill: null, actualDeath: null,
  discussionLog: [], speechesThisRound: 0, voteResults: {},
  seerChecks: [], roundSpeeches: [],
  sheriff: null, // 警长id
  resolve: null, currentSpeaker: null,
};

// ============ 工具函数 ============
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; };
const alivePlayers = () => G.players.filter(p=>p.alive);
const aliveWolves = () => G.players.filter(p=>p.alive && R[p.roleKey].camp==='wolf');
const aliveGods = () => G.players.filter(p=>p.alive && R[p.roleKey].camp==='good' && p.roleKey!=='VILL');
const aliveVills = () => G.players.filter(p=>p.alive && p.roleKey==='VILL');
const hasWitchAnti = () => G.witchAntidote;
const hasWitchPoi = () => G.witchPoison;
const humanPlayer = () => G.players[G.humanIdx];
const isHumanAlive = () => G.humanIdx >= 0 && G.players[G.humanIdx] && G.players[G.humanIdx].alive;

// ============ UI 辅助 ============
function $(id){ return document.getElementById(id); }

function logLine(msg, cls='system'){
  const el = $('logArea');
  const div = document.createElement('div');
  div.className = 'log-line ' + cls;
  div.textContent = msg;
  el.appendChild(div);
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function stripEmoji(text){
  return text.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{2300}-\u{23FF}]|[\u{2500}-\u{25FF}]|[\u{FE00}-\u{FEFF}]|[\u{200D}]|[\u{20D0}-\u{20FF}]/gu,'')
    .replace(/[★☆✿❀⚡✨🌟💫⭐🌙☀️☠️💀🔮🧪🏹🐺👤🗣🗳⏭🏁🎮🔄🎤⏹🔊🔇✅❌❓❗💬💚☠🎭🎉☀☄⬛⬜🟥🟩🟨🟦]/g,'').trim();
}

async function godSay(msg){
  logLine('📯 '+msg, 'god');
  await speakText(stripEmoji(msg));
}

function playerSay(num, msg){
  logLine('', 'speech');
  const last=$('logArea').lastChild;
  last.innerHTML='<span class="spkr">'+num+'号：</span>'+msg;
  requestAnimationFrame(() => { $('logArea').scrollTop = $('logArea').scrollHeight; });
  highlightSpeaker(num);
  setTimeout(()=>unhighlightAll(), 2500);
}

function systemSay(msg){ logLine(msg, 'system'); }
function deathSay(msg){ logLine(msg, 'death'); }

function highlightSpeaker(id){
  unhighlightAll();
  G.currentSpeaker = id;
  const card = document.querySelector('.player-card[data-id="'+id+'"]');
  if(card) card.classList.add('speaking');
}
function unhighlightAll(){
  G.currentSpeaker = null;
  document.querySelectorAll('.player-card.speaking').forEach(c=>c.classList.remove('speaking'));
}

function setCardsSelectable(ids, handler){
  // 先清除所有选择状态
  document.querySelectorAll('.player-card').forEach(c=>{
    c.classList.remove('selectable');
    c.onclick = null;
  });
  ids.forEach(id=>{
    const card = document.querySelector('.player-card[data-id="'+id+'"]');
    if(card){
      card.classList.add('selectable');
      card.onclick = () => handler(id);
    }
  });
}

function clearCardsSelectable(){
  document.querySelectorAll('.player-card.selectable').forEach(c=>{
    c.classList.remove('selectable');
    c.onclick = null;
  });
}

function updatePlayerGrid(){
  const grid = $('playersGrid');
  grid.innerHTML = G.players.map(p=>{
    let cls = 'player-card';
    if(!p.alive) cls += ' dead';
    if(p.isHuman) cls += ' human';
    let badge = '';
    let sheriffBadge = '';
    if(!p.alive) badge = '<span class="card-badge">💀</span>';
    else {
      if(p.isHuman) badge = '<span class="card-badge you">你</span>';
      if(G.sheriff === p.id) sheriffBadge = '<span class="card-badge" style="background:#f0c040;color:#1a1a2e;">🎖</span>';
    }
    const avatar = p.alive ? (p.isHuman ? '😎' : '🙂') : '💀';
    return `<div class="${cls}" data-id="${p.id}">
      ${badge}${sheriffBadge}
      <div class="card-num">${p.id}</div>
      <div class="card-avatar">${avatar}</div>
      <div class="card-label">${p.alive?'存活':'出局'}</div>
    </div>`;
  }).join('');
  // 如果之前有高亮，恢复
  if(G.currentSpeaker){
    const card = document.querySelector('.player-card[data-id="'+G.currentSpeaker+'"]');
    if(card) card.classList.add('speaking');
  }
}

function updateStatus(phase, round){
  const icons = { init:'⏳', night:'🌙', day:'☀️', vote:'🗳', gameover:'🏁' };
  const labels = { init:'准备开始', night:'黑夜阶段', day:'白天阶段', vote:'投票放逐', gameover:'游戏结束' };
  $('phaseIcon').textContent = icons[phase] || '⏳';
  const label = $('phaseLabel');
  label.textContent = labels[phase] || phase;
  label.className = 'phase-text ' + (phase==='night'?'night':phase==='day'||phase==='vote'?'day':'');
  $('roundLabel').textContent = round > 0 ? `第 ${round} 轮` : '';

  // 黑夜/白天氛围切换
  if(phase === 'night'){
    document.body.classList.remove('day-mode');
    $('nightVeil').classList.add('active');
  } else if(phase === 'day' || phase === 'vote'){
    document.body.classList.add('day-mode');
    $('nightVeil').classList.remove('active');
  } else {
    document.body.classList.remove('day-mode');
    $('nightVeil').classList.remove('active');
  }
}

function setActions(prompt, buttons){
  $('actionPrompt').textContent = prompt;
  $('actionButtons').innerHTML = buttons.map(b=>
    `<button class="btn ${b.cls||'btn-action'}" id="${b.id||''}" ${b.disabled?'disabled':''}>${b.label}</button>`
  ).join('');
  $('speechRow').classList.add('hidden');
  $('btnSend').style.display = 'none';
}

function showSpeechInput(){
  $('speechRow').classList.remove('hidden');
  $('btnSend').style.display = 'inline-block';
  $('textInput').value = '';
  $('textInput').focus();
}

function hideSpeechInput(){
  $('speechRow').classList.add('hidden');
  $('btnSend').style.display = 'none';
}

function clearLog(){ $('logArea').innerHTML = ''; }

// ============ 异步等待人类操作 ============
function waitForClick(btnIds){
  return new Promise(resolve => {
    if(G.aborted){ resolve('aborted'); return; }
    G.resolve = resolve;
    btnIds.forEach(id => {
      const btn = $(id);
      if(btn){ btn.onclick = () => { G.resolve = null; resolve(id); }; }
    });
  });
}

function waitForText(){
  return new Promise(resolve => {
    if(G.aborted){ resolve('aborted'); return; }
    G.resolve = resolve;
    showSpeechInput();
  });
}

function submitText(){
  const text = $('textInput').value.trim();
  if(!text && G.resolve) return;
  hideSpeechInput();
  if(G.resolve){ const r=G.resolve; G.resolve=null; r(text||'（沉默）'); }
}

    })),
    humanIdx,

    witchAntidote: true, witchPoison: true,
    witchSaved: null, witchPoisoned: null, lastGuardTarget: null,
    nightKill: null, actualDeath: null,
    discussionLog: [], speechesThisRound: 0, voteResults: {},
    seerChecks: [], roundSpeeches: [], sheriff: null, resolve: null, currentSpeaker: null,

// ============ 上警选警长 ============
async function sheriffElection(){
  clearLog();
  updateStatus('day', 0);
  document.body.classList.add('day-mode');
  G.phase = 'sheriff';

  await godSay('进入上警环节，竞选警长 🎖');
  await godSay('想竞选警长的玩家请举手...');
  await sleep(600);

  // 随机3-5个玩家参选（包括人类玩家有50%概率被选为参选）
  const candidates = [];
  const alive = alivePlayers();
  const n = 3 + Math.floor(Math.random()*3); // 3-5人
  const shuffled = shuffle(alive);
  for(let i=0; i<Math.min(n, alive.length); i++){
    candidates.push(shuffled[i]);
  }
  // 确保人类玩家一定有机会参选
  const human = humanPlayer();
  if(!candidates.find(c=>c.id===human.id)){
    candidates[0] = human;
  }

  const ids = candidates.map(c=>c.id+'号').join('、');
  systemSay(`参选警长的玩家：${ids}`);
  await sleep(400);

  // 每个候选人发言
  for(const c of candidates){
    highlightSpeaker(c.id);
    if(c.isHuman){
      setActions(`🎖 你是警长候选人，请发表竞选宣言`, []);
      showSpeechInput();
      $('actionPrompt').textContent = `🎖 请发表你的竞选宣言（${c.id}号）`;
      const speech = await waitForText();
      if(G.aborted) return;
      const t = speech || '我会带领好人走向胜利！请投票给我。';
      playerSay(c.id, t+'（竞选警长）');
      hideSpeechInput();
    } else {
      setActions(`💬 ${c.id}号发表竞选宣言...`, []);
      await sleep(400+Math.random()*400);
      const speeches = [
        '我是好人，我会认真听取每个人的发言，带领大家找出狼人。请投我一票！',
        '我有很强的逻辑分析能力，一定能帮好人阵营获胜。选我当警长不会错。',
        '我虽然不是什么神职，但我会公正地组织发言，确保每个人都说出自己的观点。',
        '昨晚我想了很久，我觉得我适合当警长。我会保护好人，追击狼人！',
      ];
      const s = speeches[Math.floor(Math.random()*speeches.length)];
      playerSay(c.id, s+'（竞选警长）');
      if(!muteAI) speakText(s);
    }
  }

  unhighlightAll();
  await sleep(400);
  await godSay('现在投票选出警长 🗳');

  // 投票
  const votes = {};
  candidates.forEach(c=>{ votes[c.id]=0; });
  for(const voter of alive){
    if(voter.isHuman){
      setActions('🎖 请投票选出警长', candidates.map(c=>({
        id:'sheriffVote_'+c.id, label:c.id+'号', cls:'btn-action'
      })));
      const chosen = await waitForClick(candidates.map(c=>'sheriffVote_'+c.id));
      if(G.aborted) return;
      const target = parseInt(chosen.replace('sheriffVote_',''));
      votes[target]++;
      systemSay(`你投票给了 ${target} 号`);
    } else {
      // AI 投票：随机但有偏好（偏好发言积极的）
      const t = candidates[Math.floor(Math.random()*candidates.length)];
      votes[t.id]++;
    }
  }

  // 公布结果
  let maxV=0, winner=null;
  Object.entries(votes).forEach(([id,count])=>{
    systemSay(`  ${id}号：${count} 票`);
    if(count>maxV){ maxV=count; winner=parseInt(id); }
  });

  G.sheriff = winner;
  await godSay(`${winner}号玩家当选警长！🎖`);
  systemSay(`警长拥有1.5票投票权`);

  // 更新卡片显示警长标记
  updatePlayerGrid();
  await sleep(600);
  updateStatus('night', 1);
  document.body.classList.remove('day-mode');
  startRound();
}

function endGame(){

  G.aborted = true;

  updateStatus('init', 0);
  systemSay('游戏已结束，点击下方重新开始');

// ============ 回合流程 ============
async function startRound(){
  if(G.aborted) return;
  G.round++; G.nightTargets={wolf:null,seer:null,guard:null};
  G.witchSaved=null; G.witchPoisoned=null; G.nightKill=null;
  G.actualDeath=null; G.speechesThisRound=0; G.roundSpeeches=[]; G.voteResults={};

  updateStatus('night', G.round); updatePlayerGrid(); updateDebug();
  await godSay('——————————————');
  await godSay(`第 ${G.round} 轮 · 天黑请闭眼`);
  await godSay('所有玩家请闭眼...');
  await sleep(1000);

  // === 狼人行动 ===
  await godSay('狼人请睁眼，选择今晚要猎杀的目标...');
  await sleep(600);
  let wolfTarget;
  const humanIsWolf = humanPlayer().roleKey === 'WOLF' && isHumanAlive();
  if(humanIsWolf){
    const targets = alivePlayers().filter(p=>R[p.roleKey].camp!=='wolf');
    setActions('🐺 选择今晚要杀的目标', targets.map(p=>({
      id:'wolfT_'+p.id, label:p.id+'号', cls:'btn-danger'
    })));
    setCardsSelectable(targets.map(p=>p.id), id=>{
      const btn = $('wolfT_'+id);
      if(btn) btn.click();
    });
    const chosen = await waitForClick(targets.map(p=>'wolfT_'+p.id));
    clearCardsSelectable();
    wolfTarget = parseInt(chosen.replace('wolfT_',''));
    systemSay(`🐺 狼人已选定猎杀 ${wolfTarget} 号`);
  } else {
    wolfTarget = aiWolfTarget();
    if(humanPlayer().roleKey==='WOLF' && isHumanAlive()){
      systemSay(`🐺 狼同伴决定猎杀 ${wolfTarget} 号`);
    } else { systemSay('🐺 狼人已选定目标...'); }
  }
  G.nightTargets.wolf = wolfTarget; G.nightKill = wolfTarget;
  await sleep(400);

  // === 预言家行动 ===
  await godSay('预言家请睁眼，选择要查验的玩家...');
  await sleep(400);
  let seerTarget;
  const humanIsSeer = humanPlayer().roleKey === 'SEER' && isHumanAlive();
  if(humanIsSeer){
    const targets = alivePlayers().filter(p=>p.id!==humanPlayer().id);
    setActions('🔮 选择要查验的玩家', targets.map(p=>({
      id:'seerT_'+p.id, label:p.id+'号', cls:'btn-action'
    })));
    setCardsSelectable(targets.map(p=>p.id), id=>{ const btn=$('seerT_'+id); if(btn) btn.click(); });
    const chosen = await waitForClick(targets.map(p=>'seerT_'+p.id));
    clearCardsSelectable();
    seerTarget = parseInt(chosen.replace('seerT_',''));
    const isWolf = R[G.players[seerTarget-1].roleKey].camp==='wolf';
    systemSay(`🔮 查验结果：${seerTarget}号是 ${isWolf?'🐺 狼人！':'✅ 好人'}`);
    G.seerChecks.push({round:G.round, targetId:seerTarget, isWolf});
  } else {
    seerTarget = aiSeerTarget();
    const tw = G.players[seerTarget-1];
    G.seerChecks.push({round:G.round, targetId:seerTarget, isWolf:R[tw.roleKey].camp==='wolf'});
  }
  G.nightTargets.seer = seerTarget;
  await sleep(400);

  // === 女巫行动 ===
  const witchAlive = G.players.find(p=>p.alive && p.roleKey==='WITCH');
  if(witchAlive && (hasWitchAnti()||hasWitchPoi())){
    await godSay('女巫请睁眼...'); await sleep(300);
    const humanIsWitch = witchAlive.isHuman;
    if(humanIsWitch){ systemSay(`🧪 今晚 ${wolfTarget} 号被狼人杀害`); }
    if(hasWitchAnti()){
      if(humanIsWitch){
        setActions(`🧪 今晚 ${wolfTarget} 号被杀，是否使用解药？`, [
          {id:'witchSave_yes', label:`💚 救 ${wolfTarget} 号`, cls:'btn-accent'},
          {id:'witchSave_no', label:'不使用解药', cls:'btn-skip'},
        ]);
        const choice = await waitForClick(['witchSave_yes','witchSave_no']);
        if(choice==='witchSave_yes'){ G.witchSaved=wolfTarget; G.witchAntidote=false; systemSay('🧪 已使用解药'); }
      } else {
        if(aiWitchAntidote(wolfTarget)){ G.witchSaved=wolfTarget; G.witchAntidote=false; systemSay('🧪 女巫使用了【解药】'); }
      }
    }
    if(hasWitchPoi()){
      if(humanIsWitch){
        const pts = alivePlayers().filter(p=>p.id!==witchAlive.id);
        setActions('☠️ 是否使用毒药？', [
          ...pts.map(p=>({id:'witchP_'+p.id, label:`☠️ 毒 ${p.id}号`, cls:'btn-danger'})),
          {id:'witchPoison_no', label:'不使用毒药', cls:'btn-skip'},
        ]);
        const choice = await waitForClick([...pts.map(p=>'witchP_'+p.id), 'witchPoison_no']);
        if(choice!=='witchPoison_no'){ G.witchPoisoned=parseInt(choice.replace('witchP_','')); G.witchPoison=false; systemSay(`🧪 女巫毒杀了 ${G.witchPoisoned} 号`); }
      } else {
        const aiP=aiWitchPoison();
        if(aiP!==null){ G.witchPoisoned=aiP; G.witchPoison=false; systemSay('🧪 女巫使用了【毒药】'); }
      }
    }
  }
  await sleep(400);

  // === 结算夜晚 ===
  await godSay('天亮了...'); await sleep(800);
  const deaths=[];
  if(G.nightKill && G.witchSaved!==G.nightKill) deaths.push({id:G.nightKill, cause:'被狼人杀害'});
  if(G.witchPoisoned!==null) deaths.push({id:G.witchPoisoned, cause:'中毒身亡'});
  G.actualDeath=deaths;
  deaths.forEach(d=>{
    G.players[d.id-1].alive=false;
    passSheriff(d.id);
  });
  updatePlayerGrid();

  if(deaths.length===0){ await godSay('昨晚是平安夜，无人死亡 ✨'); }
  else { deaths.forEach(d=>{ deathSay(`💀 ${d.id}号玩家 ${d.cause}`); }); }

  await sleep(800);

  // === 猎人开枪 ===
  for(const d of deaths){
    const dp = G.players[d.id-1];
    if(dp.roleKey==='HUNTER'){
      await godSay(`🏹 ${d.id}号是猎人！可以开枪带走一名玩家...`); await sleep(400);
      if(dp.isHuman && isHumanAlive()){
        const targets = alivePlayers().filter(p=>p.id!==dp.id);
        setActions('🏹 选择要带走的玩家', targets.map(p=>({
          id:'huntS_'+p.id, label:p.id+'号', cls:'btn-danger'
        })));
        const chosen = await waitForClick(targets.map(p=>'huntS_'+p.id));
        const shot = parseInt(chosen.replace('huntS_',''));
        G.players[shot-1].alive=false; deathSay(`🏹 猎人开枪带走了 ${shot} 号玩家！`);
      } else {
        const shot=aiHunterShot(dp.id);
        if(shot!==null){ G.players[shot-1].alive=false; deathSay(`🏹 猎人开枪带走了 ${shot} 号玩家！`); }
      }
    }
  }
  updatePlayerGrid(); updateDebug(); await sleep(600);
  if(G.aborted || await checkWin()) return;
  await dayDiscussion();
  if(G.aborted || await checkWin()) return;
  await votingPhase();
  if(G.aborted || await checkWin()) return;
  await godSay('——————————————'); await sleep(500);
  if(!G.aborted) startRound();
}

// ============ 白天讨论 ============
async function dayDiscussion(){
  if(G.aborted) return;
  G.phase='day'; updateStatus('day', G.round);
  await godSay('进入自由发言阶段，按编号顺序发言 🗣');
  const speakers = alivePlayers().sort((a,b)=>a.id-b.id);
  for(const p of speakers){
    if(G.aborted) return;
    if(!p.alive) continue;
    if(p.isHuman && isHumanAlive()){
      highlightSpeaker(p.id);
      setActions(`🗣 轮到你了（${p.id}号），请发言`, []);
      showSpeechInput();
      $('actionPrompt').textContent = `🗣 轮到你发言了（${p.id}号）`;
      $('textInput').placeholder = '输入你的发言...';
      const speech = await waitForText();
      if(G.aborted) return;
      const finalText = speech || '（沉默）';
      playerSay(p.id, finalText);
      G.roundSpeeches.push({playerId:p.id, text:finalText});
      hideSpeechInput(); setActions('等待其他人发言...', []);
    } else {
      const aiSpeech = await aiGenerateSpeech(p);
      if(G.aborted) return;
      playerSay(p.id, aiSpeech);
      G.roundSpeeches.push({playerId:p.id, text:aiSpeech});
      setActions(`💬 ${p.id}号正在发言...（AI语音播报中）`, [
        {id:'btnSkipSpeech', label:'⏭ 跳过语音', cls:'btn-skip'},
      ]);
      $('speechRow').classList.add('hidden');
      const voiceOpts = VOICE_PROFILES[p.personality] || {};
      const spoke = speakText(aiSpeech, voiceOpts);
      const skipped = waitForClick(['btnSkipSpeech']);
      await Promise.race([spoke, skipped]);
      if(G.aborted){ skipSpeech(); return; }
      skipSpeech();
      setActions('等待其他人发言...', []);
      await sleep(200+Math.random()*300);
    }
  }
  unhighlightAll();
  systemSay('发言结束'); await sleep(500);
}

// ============ 投票 ============
async function votingPhase(){
  if(G.aborted) return;
  G.phase='vote'; updateStatus('vote', G.round);
  await godSay('现在开始投票放逐，请选择你要放逐的玩家 🗳');
  const voters = alivePlayers(); const candidates = alivePlayers();
  candidates.forEach(c=>{ G.voteResults[c.id]=0; });
  for(const voter of voters){
    const weight = (voter.id === G.sheriff) ? 2 : 1; // 警长1.5票→计为2票
    if(voter.isHuman && isHumanAlive()){
      setActions(`🗳 请投票选择要放逐的玩家${weight>1?'（你是警长，有2票）':''}`, candidates.map(c=>({
        id:'vote_'+c.id, label:c.id+'号', cls:'btn-danger'
      })));
      setCardsSelectable(candidates.map(c=>c.id), id=>{ const btn=$('vote_'+id); if(btn)btn.click(); });
      const chosen = await waitForClick(candidates.map(c=>'vote_'+c.id));
      if(G.aborted) return;
      clearCardsSelectable();
      const target = parseInt(chosen.replace('vote_',''));
      G.voteResults[target] += weight;
      systemSay(`你投票给了 ${target} 号${weight>1?'（警长2票）':''}`);
    } else {
      const target = aiVote(voter);
      if(target) G.voteResults[target] += weight;
    }
  }
  await godSay('投票结果：');
  Object.entries(G.voteResults).forEach(([id,count])=>{
    if(count>0) systemSay(`  ${id}号：${count} 票`);
  });
  let maxV=0, eliminated=[];
  Object.entries(G.voteResults).forEach(([id,count])=>{
    if(count>maxV){ maxV=count; eliminated=[parseInt(id)]; }
    else if(count===maxV && count>0){ eliminated.push(parseInt(id)); }
  });
  if(eliminated.length===0){ systemSay('无人被放逐'); }
  else if(eliminated.length>1){
    systemSay(`平票！${eliminated.join('号、')}号均被放逐`);
    eliminated.forEach(id=>{ G.players[id-1].alive=false; passSheriff(id); deathSay(`🗳 ${id}号被投票放逐（平票）`); });
  } else {
    const id=eliminated[0]; G.players[id-1].alive=false; passSheriff(id);
    deathSay(`🗳 ${id}号被投票放逐`);
    await godSay(`${id}号玩家被放逐出局，请留遗言`);
    if(G.players[id-1].roleKey==='HUNTER'){
      await sleep(400); await godSay(`🏹 ${id}号是猎人！可以开枪...`);
      if(G.players[id-1].isHuman){
        const targets=alivePlayers().filter(p=>p.id!==id);
        setActions('🏹 选择要带走的玩家', targets.map(p=>({
          id:'huntS_'+p.id, label:p.id+'号', cls:'btn-danger'
        })));
        const chosen=await waitForClick(targets.map(p=>'huntS_'+p.id));
        const shot=parseInt(chosen.replace('huntS_',''));
        G.players[shot-1].alive=false; deathSay(`🏹 猎人带走了 ${shot} 号`);
      } else { const shot=aiHunterShot(id); if(shot!==null){ G.players[shot-1].alive=false; deathSay(`🏹 猎人带走了 ${shot} 号`); } }
    }
  }
  updatePlayerGrid(); updateDebug(); await sleep(800);
}

// ============ 胜负判定 ============
function passSheriff(deadId){
  if(deadId === G.sheriff){
    const aliveGood = alivePlayers().filter(p=>R[p.roleKey].camp==='good');
    if(aliveGood.length>0){
      G.sheriff = aliveGood[Math.floor(Math.random()*aliveGood.length)].id;
      systemSay(`🎖 警长死亡，${G.sheriff}号继任警长`);
    } else { G.sheriff = null; }
  }
}

async function checkWin(){
  const wolves=aliveWolves(), gods=aliveGods(), vills=aliveVills();
  if(gods.length===0||vills.length===0){ await gameOver('wolf'); return true; }
  if(wolves.length===0){ await gameOver('good'); return true; }
  return false;
}

async function gameOver(winner){
  G.phase='gameover'; updateStatus('gameover', G.round);
  await godSay('══════════════');
  if(winner==='wolf'){
    await godSay('🐺 狼人阵营获胜！');
    systemSay(humanPlayer().roleKey==='WOLF'?'🎉 恭喜你赢了！狼人屠城成功！':'💀 狼人屠城了...你输了');
  } else {
    await godSay('🎉 好人阵营获胜！');
    systemSay(R[humanPlayer().roleKey].camp==='good'?'🎉 恭喜你赢了！所有狼人被消灭！':'💀 你的狼人同伴全被消灭了...');
  }
  systemSay(''); systemSay('—— 身份揭晓 ——');
  G.players.forEach(p=>{
    const role=R[p.roleKey];
    systemSay(`${p.id}号：${role.emoji} ${role.name} ${!p.alive?'💀':''} ${p.isHuman?'👈':''}`);
  });
  updatePlayerGrid(); updateDebug();
  $('btnEnd').style.display = 'none';
  setActions('游戏结束！', [{id:'btnRestart', label:'🔄 再来一局', cls:'btn-start'}]);
  waitForClick(['btnRestart']).then(()=>startGame());
}

// ============ AI 引擎 ============
function aiWolfTarget(){
  const targets = alivePlayers().filter(p=>R[p.roleKey].camp!=='wolf');
  const priority = targets.filter(p=>p.roleKey==='SEER'||p.roleKey==='WITCH');
  if(priority.length>0 && Math.random()<0.75) return priority[Math.floor(Math.random()*priority.length)].id;
  return targets[Math.floor(Math.random()*targets.length)].id;
}
function aiSeerTarget(){
  const targets = alivePlayers().filter(p=>!G.nightTargets.seer||p.id!==G.nightTargets.seer);
  const unchecked = targets.filter(p=>p.roleKey!=='SEER');
  if(unchecked.length===0) return targets[0]?.id;
  return unchecked[Math.floor(Math.random()*unchecked.length)].id;
}
function aiWitchAntidote(wolfTarget){
  if(G.round===1) return Math.random()<0.8;
  const t=G.players[wolfTarget-1];
  if(t&&(t.roleKey==='SEER'||t.roleKey==='HUNTER')) return Math.random()<0.6;
  return Math.random()<0.3;
}
function aiWitchPoison(){
  if(G.round<2) return null;
  if(Math.random()<0.4) return null;
  const suspects=alivePlayers().filter(p=>R[p.roleKey].camp==='wolf');
  if(suspects.length===0) return null;
  return suspects[Math.floor(Math.random()*suspects.length)].id;
}
function aiHunterShot(hunterId){
  const targets=alivePlayers().filter(p=>p.id!==hunterId);
  if(targets.length===0) return null;
  const wolves=targets.filter(p=>R[p.roleKey].camp==='wolf');
  if(wolves.length>0 && Math.random()<0.5) return wolves[Math.floor(Math.random()*wolves.length)].id;
  return targets[Math.floor(Math.random()*targets.length)].id;
}

// ============ DeepSeek API 发言生成 ============
function buildPromptForPlayer(player){
  const role=R[player.roleKey]; const isWolf=role.camp==='wolf';
  const aliveIds=alivePlayers().map(p=>p.id);
  const deadIds=G.players.filter(p=>!p.alive).map(p=>p.id);
  let nightInfo='';
  if(G.actualDeath&&G.actualDeath.length>0) nightInfo=G.actualDeath.map(d=>`${d.id}号${d.cause}`).join('，');
  else if(G.round>0) nightInfo='昨晚是平安夜，无人死亡';
  let wolfInfo='';
  if(isWolf){
    const mates=G.players.filter(p=>p.roleKey==='WOLF'&&p.id!==player.id&&p.alive).map(p=>p.id+'号');
    const deadW=G.players.filter(p=>p.roleKey==='WOLF'&&!p.alive).map(p=>p.id+'号');
    wolfInfo=`你的狼同伴：${mates.join('、')}。`;
    if(deadW.length>0) wolfInfo+=`（${deadW.join('、')}已出局）`;
  }
  let seerInfo='';
  if(player.roleKey==='SEER'&&G.seerChecks.length>0){
    seerInfo='你的查验记录：\n';
    G.seerChecks.forEach(c=>{ seerInfo+=`- 第${c.round}轮查${c.targetId}号：${c.isWolf?'狼人':'好人'}\n`; });
  }
  let strategy='';
  if(isWolf){ strategy=`你是狼人，伪装成好人。像普通村民一样推理、甩锅，绝不暴露同伴。`; }
  else if(player.roleKey==='SEER'){ strategy=`你是预言家，以平民身份发言。用"我觉得""我感觉"暗示查验结果，绝不说"我查验过"。`; }
  else if(player.roleKey==='WITCH'){ strategy=`你是女巫，以平民身份发言。完全像平民一样推理，不暴露身份。`; }
  else if(player.roleKey==='HUNTER'){ strategy=`你是猎人，以平民身份发言。被攻击时适度回击但不暴露。`; }
  else { strategy=`你是平民，仔细听发言找矛盾，表达怀疑对象和理由。`; }
  let prevSpeeches='';
  if(G.roundSpeeches.length>0){
    prevSpeeches='【本轮已有发言】\n';
    G.roundSpeeches.forEach(s=>{ prevSpeeches+=`${s.playerId}号："${s.text}"\n`; });
  } else { prevSpeeches='（本轮第一个发言）'; }

  return `你是${player.id}号玩家。9人狼人杀（3狼1预言1女巫1猎人3平民）。

【真实身份】${role.emoji} ${role.name}
${wolfInfo}${seerInfo}
【局势】第${G.round}轮白天 | 存活：${aliveIds.join('、')}号 | 出局：${deadIds.length>0?deadIds.join('、')+'号':'无'} | ${nightInfo}

${prevSpeeches}
【策略】${strategy}
【要求】3-5句话，自然流畅，有明确怀疑对象。只输出发言内容，不加前缀。`;
}

async function callDeepSeek(prompt){
  const apiKey=getApiKey(); if(!apiKey) return null;
  try{
    const resp=await fetch(DEEPSEEK_API,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:'deepseek-chat',messages:[
        {role:'system',content:'你是一个狼人杀玩家，发言像真人一样自然。只输出发言内容。'},
        {role:'user',content:prompt}
      ],temperature:0.9,max_tokens:300}),
    });
    if(!resp.ok){ console.error('API错误:',resp.status); return null; }
    const data=await resp.json();
    const content=data.choices?.[0]?.message?.content;
    if(content) return content.trim().replace(/^["'""]/,'').replace(/["'""]$/,'').replace(/^（.+?）\s*/,'').replace(/^\d+号[说：:]\s*/,'');
    return null;
  }catch(e){ console.error('API失败:',e); return null; }
}

async function aiGenerateSpeech(player){
  const apiKey=getApiKey();
  if(apiKey){
    setActions(`🤖 ${player.id}号正在思考...`,[]);
    const prompt=buildPromptForPlayer(player);
    const result=await callDeepSeek(prompt);
    if(G.aborted) return '...';
    if(result) return result;
    systemSay('⚠️ API失败，使用备用发言');
  }
  const suspects=alivePlayers().filter(p=>p.id!==player.id);
  if(suspects.length===0) return '我觉得没什么好说的，大家看着投吧。';
  const t=suspects[Math.floor(Math.random()*suspects.length)];
  return `我觉得${t.id}号有点可疑，发言不太自然。大家怎么看？我暂时倾向于怀疑他，但还需要更多信息来确认。`;
}

function aiVote(voter){
  const candidates=alivePlayers().filter(p=>p.id!==voter.id);
  if(candidates.length===0) return null;
  const isWolf=R[voter.roleKey].camp==='wolf';
  if(isWolf){
    const good=candidates.filter(p=>R[p.roleKey].camp==='good');
    return good.length>0?good[Math.floor(Math.random()*good.length)].id:candidates[0].id;
  }else{
    const wolves=candidates.filter(p=>R[p.roleKey].camp==='wolf');
    if(wolves.length>0&&Math.random()<0.45) return wolves[Math.floor(Math.random()*wolves.length)].id;
    return candidates[Math.floor(Math.random()*candidates.length)].id;
  }
}

// ============ 语音 ============
let recognition=null, isListening=false;
let muteAI=false, chineseVoice=null, currentSpeech=null;

function initVoice(){
  const voices=speechSynthesis.getVoices();
  chineseVoice=voices.find(v=>v.lang==='zh-CN')||voices.find(v=>v.lang.startsWith('zh'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang==='zh-HK');
}
if(typeof speechSynthesis!=='undefined'){ speechSynthesis.onvoiceschanged=initVoice; initVoice(); }

const VOICE_PROFILES={
  '激进':{rate:1.15,pitch:1.2,volume:1.0},
  '分析':{rate:0.95,pitch:1.0,volume:1.0},
  '保守':{rate:0.85,pitch:0.9,volume:0.85},
  '跟风':{rate:1.0,pitch:1.05,volume:0.9},
  '谨慎':{rate:0.9,pitch:0.95,volume:0.9},
};

function speakText(text, options={}){
  return new Promise(resolve=>{
    if(G.aborted){ resolve(); return; }
    if(muteAI||!text||typeof speechSynthesis==='undefined'){ resolve(); return; }
    speechSynthesis.cancel();
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='zh-CN'; utter.rate=options.rate||1.05; utter.pitch=options.pitch||1.0; utter.volume=options.volume||1.0;
    if(chineseVoice) utter.voice=chineseVoice;
    currentSpeech=utter;
    utter.onend=()=>{ currentSpeech=null; resolve(); };
    utter.onerror=()=>{ currentSpeech=null; resolve(); };
    speechSynthesis.speak(utter);
  });
}
function toggleMute(){
  muteAI=!muteAI; const btn=$('btnMute');
  if(muteAI){ btn.textContent='🔇'; btn.classList.add('muted'); if(typeof speechSynthesis!=='undefined') speechSynthesis.cancel(); }
  else { btn.textContent='🔊'; btn.classList.remove('muted'); }
}
function skipSpeech(){ if(currentSpeech){ speechSynthesis.cancel(); currentSpeech=null; } }

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('请使用Chrome或Edge浏览器'); return; }
  if(isListening){ stopMic(); return; }
  recognition=new SR();
  recognition.lang='zh-CN'; recognition.interimResults=true; recognition.continuous=true;
  recognition.onstart=()=>{ isListening=true; $('btnMic').textContent='⏹'; $('btnMic').classList.add('listening'); $('micStatusLine').textContent='🎤 聆听中...'; };
  recognition.onaudiostart=()=>{ $('micStatusLine').textContent='🔊 检测到声音...'; };
  recognition.onspeechstart=()=>{ $('micStatusLine').textContent='🗣 识别中...'; };
  recognition.onresult=(event)=>{
    let f='',it='';
    for(let i=event.resultIndex;i<event.results.length;i++){ const r=event.results[i]; if(r.isFinal) f+=r[0].transcript; else it+=r[0].transcript; }
    if(f){ $('textInput').value=f; $('micStatusLine').textContent='✅ '+f; setTimeout(()=>{ if(isListening) stopMic(); submitText(); },600); }
    else if(it){ $('textInput').value=it; $('micStatusLine').textContent='🔄 '+it; }
  };
  recognition.onerror=(e)=>{ $('micStatusLine').textContent='❌ '+e.error; if(e.error==='not-allowed') alert('请允许麦克风访问'); if(e.error!=='aborted') stopMic(); };
  recognition.onend=()=>{ if(isListening){ try{recognition.start();}catch(e){stopMic();} } };
  try{recognition.start();}catch(e){$('micStatusLine').textContent='启动失败: '+e.message;}
}
function stopMic(){
  isListening=false; if(recognition){ try{recognition.stop();}catch(e){} recognition=null; }
  $('btnMic').textContent='🎤'; $('btnMic').classList.remove('listening'); $('micStatusLine').textContent='';
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ============ 密码保护 ============
const PASSWORD_KEY='werewolf_access_pw';
function checkPassword(){
  const input=$('lockInput').value.trim();
  const saved=localStorage.getItem(PASSWORD_KEY)||'';
  if(!saved){
    if(input.length<3){ $('lockMsg').textContent='密码至少3位'; return; }
    localStorage.setItem(PASSWORD_KEY,input); $('lockOverlay').style.display='none'; return;
  }
  if(input===saved){ $('lockOverlay').style.display='none'; }
  else { $('lockMsg').textContent='❌ 密码错误'; $('lockInput').value=''; }
}
function showLockScreen(){
  const saved=localStorage.getItem(PASSWORD_KEY)||'';
  $('lockInput').value=''; $('lockMsg').textContent='';
  $('lockPrompt').textContent=saved?'请输入访问密码':'首次访问，请设置访问密码';
  $('lockOverlay').style.display='flex';
}

showLockScreen();
loadApiKey();
updatePlayerGrid();
